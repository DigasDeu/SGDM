<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link rel="stylesheet"
href="assets/css/login.css">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
rel="stylesheet">

</head>

<body>

<div class="login-container">

    <img
    src="assets/img/semsa-logo.png"
    class="logo">
    <!-- LOGIN EMAIL -->

    <div class="login-box">

        <input
        type="email"
        id="email"
        placeholder="Seu email">

        <input
        type="password"
        id="senha"
        placeholder="Sua senha">

        <button id="loginBtn">

            Entrar

        </button>

    </div>

    <p class="cadastro-link">

        Não possui conta?

        <a href="pages/cadastro.html">

            Criar conta

        </a>

    </p>

    <!-- GOOGLE -->

    <button
    class="google-btn"
    id="googleLogin">

        <img
        src="assets/img/google.png">

        Entrar com Google

    </button>

</div>

<script type="module"
src="assets/js/login.js">
</script>

</body>

</html>
