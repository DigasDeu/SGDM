<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Solicitações</title>

<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/sidebar.css">
<link rel="stylesheet" href="../assets/css/solicitacoes.css">
<link rel="stylesheet" href="../assets/css/responsive.css">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

</head>

<body>

<aside class="sidebar" id="sidebar">

    <div class="sidebar-header">

        <img
        src="../assets/img/user.png"
        alt="Usuário"
        class="user-photo"
        id="fotoUsuario">

        <h3 class="user-name" id="nomeUsuario">
            Usuário
        </h3>

        <p class="user-email" id="emailUsuario">
            email@usuario.com
        </p>

    </div>

    <nav class="sidebar-menu">

        <a href="../dashboard.html">
            <i class="fas fa-house"></i>
            Dashboard
        </a>

        <a href="agenda.html">
            <i class="fas fa-calendar"></i>
            Agenda
        </a>

        <a href="solicitacoes.html">
            <i class="fas fa-file-lines"></i>
            Solicitações
        </a>

        <a href="publicacoes.html">
            <i class="fas fa-bullhorn"></i>
            Publicações
        </a>

        <a href="producoes.html">
            <i class="fas fa-video"></i>
            Produções
        </a>

        <a href="relatorio.html">
            <i class="fas fa-chart-line"></i>
            Relatórios
        </a>

        <a href="configs.html">
            <i class="fas fa-gear"></i>
            Configurações
        </a>

        <a href="#" onclick="logout()">
            <i class="fas fa-right-from-bracket"></i>
            Sair
        </a>

    </nav>

</aside>

<div class="overlay" id="overlay"></div>

<header class="top-header">

    <div class="menu-btn">
        <i class="fas fa-bars"></i>
    </div>

    <div class="logo-area">
        <h1>Solicitações</h1>
    </div>

</header>

<section class="page-content">

    <div class="solicitacoes-top">

        <input
        type="text"
        id="pesquisaSolicitacao"
        placeholder="Pesquisar por título, solicitante ou local...">

        <button class="primary-btn" id="abrirModal">
            Nova Solicitação
        </button>

    </div>

    <div class="filtros">

        <button class="filtro-btn active" data-status="Todos">
            Todos
        </button>

        <button class="filtro-btn" data-status="Pendente">
            Pendentes
        </button>

        <button class="filtro-btn" data-status="Andamento">
            Andamento
        </button>

        <button class="filtro-btn" data-status="Concluído">
            Concluídos
        </button>

    </div>

    <div id="listaSolicitacoes"></div>

</section>

<div class="modal" id="modalSolicitacao">

    <div class="modal-content">

        <h2>Nova Solicitação</h2>

        <input type="text" id="titulo" placeholder="Título da solicitação">

        <input type="text" id="solicitante" placeholder="Solicitante / Departamento">

        <input type="date" id="data">

        <input type="time" id="hora">

        <input type="text" id="local" placeholder="Local da ação">

        <input type="text" id="responsavel" placeholder="Responsável pela ação">

        <select id="status">
            <option>Pendente</option>
            <option>Andamento</option>
            <option>Concluído</option>
        </select>

        <textarea
        id="descricao"
        placeholder="Descrição: A ação ocorrerá em tal dia, tal horário, no local informado, com acompanhamento do responsável e do departamento solicitante."></textarea>

        <div class="modal-actions">

            <button id="salvarSolicitacao">
                Salvar
            </button>

            <button id="fecharModal">
                Cancelar
            </button>

        </div>

    </div>

</div>

<nav class="bottom-nav">

    <a href="../dashboard.html">
        <i class="fas fa-house"></i>
        <span>Início</span>
    </a>

    <a href="solicitacoes.html" class="active">
        <i class="fas fa-file-lines"></i>
        <span>Solicitações</span>
    </a>

    <a href="agenda.html">
        <i class="fas fa-calendar"></i>
        <span>Agenda</span>
    </a>

    <a href="relatorio.html">
        <i class="fas fa-chart-line"></i>
        <span>Relatórios</span>
    </a>

    <a href="mais.html">
        <i class="fas fa-ellipsis"></i>
        <span>Mais</span>
    </a>

</nav>

<script src="../assets/js/sidebar.js"></script>
<script src="../assets/js/solicitacoes.js"></script>
<script type="module" src="../assets/js/auth.js"></script>

</body>

</html>
