    <nav class="sidebar-menu">

</aside>

<div class="overlay" id="overlay"></div>

<header class="top-header">

    <div class="menu-btn">
        <i class="fas fa-bars"></i>
    </div>

    <div class="logo-area">
        <h1>Solicitações</h1>
    </div>

</header>

<section class="page-content">

    <div class="solicitacoes-top">

        <input
        type="text"
        id="pesquisaSolicitacao"
        placeholder="Pesquisar por título, solicitante, setor ou local...">

        <button class="primary-btn" id="abrirModal">
            Nova Solicitação
        </button>

    </div>

    <div class="filtros">

        <button class="filtro-btn active" data-status="Todos">Todos</button>

        <button class="filtro-btn" data-status="Pendente">Pendentes</button>

        <button class="filtro-btn" data-status="Andamento">Andamento</button>

        <button class="filtro-btn" data-status="Concluído">Concluídos</button>

    </div>

    <div id="listaSolicitacoes"></div>

</section>

<div class="modal" id="modalSolicitacao">

    <div class="modal-content">

        <h2>Nova Solicitação</h2>

        <form id="formSolicitacao">

            <input type="text" id="titulo" placeholder="Título da solicitação" required>

            <input type="text" id="solicitante" placeholder="Nome do solicitante" required>

            <input type="text" id="setor" placeholder="Setor / Departamento" required>

            <input type="tel" id="contato" placeholder="Contato do responsável pela demanda">

            <input type="date" id="data" required>

            <input type="time" id="hora" required>

            <div class="localizacao-area">

                <label for="local">Localização da ação *</label>

                <input
                type="text"
                id="local"
                placeholder="Digite ou marque o local no mapa"
                required>

                <button type="button" id="buscarEndereco" class="map-btn">
                    Buscar no mapa
                </button>

                <button type="button" id="usarLocalizacao" class="map-btn secondary">
                    Usar minha localização atual
                </button>

                <div id="mapaSolicitacao" class="mapa-solicitacao"></div>

                <input type="hidden" id="latitude">
                <input type="hidden" id="longitude">

                <small>
                    Clique no mapa para marcar o local exato da solicitação.
                </small>

            </div>

            <div class="equipe-area">

                <strong>Equipe da Cobertura</strong>

                <label>
                    <input type="checkbox" name="equipeCobertura" value="Diego">
                    Diego
                </label>

                <label>
                    <input type="checkbox" name="equipeCobertura" value="Alicia">
                    Alicia
                </label>

                <label>
                    <input type="checkbox" name="equipeCobertura" value="Clarissa">
                    Clarissa
                </label>

                <label>
                    <input type="checkbox" name="equipeCobertura" value="Kelson">
                    Kelson
                </label>

            </div>

            <select id="prioridade" required>
                <option value="">Selecione a prioridade</option>
                <option>Baixa</option>
                <option>Média</option>
                <option>Alta</option>
                <option>Urgente</option>
            </select>

            <select id="status" required>
                <option>Pendente</option>
                <option>Andamento</option>
                <option>Concluído</option>
            </select>

            <textarea id="descricao" placeholder="Descrição da solicitação"></textarea>

            <input
            type="file"
            id="anexos"
            multiple
            accept=".pdf,.jpg,.jpeg,.png,.doc,.docx">

            <div class="modal-actions">

                <button type="submit" id="salvarSolicitacao">
                    Salvar
                </button>

                <button type="button" id="fecharModal">
                    Cancelar
                </button>

            </div>

        </form>

    </div>

</div>
