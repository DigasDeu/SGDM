</head>

<body>

    <div class="sidebar-header">

        <img src="../assets/img/user.png" alt="Usuário" class="user-photo" id="fotoUsuario">

        <h3 class="user-name" id="nomeUsuario">Usuário</h3>

        <p class="user-email" id="emailUsuario">email@usuario.com</p>

    </div>

    <nav class="sidebar-menu">

        <a href="../dashboard.html">
            <i class="fas fa-house"></i>
            Dashboard
        </a>

        <a href="agenda.html">
            <i class="fas fa-calendar"></i>
            Agenda
        </a>

        <a href="solicitacoes.html">
            <i class="fas fa-file-lines"></i>
            Solicitações
        </a>

        <a href="publicacoes.html">
            <i class="fas fa-bullhorn"></i>
            Publicações
        </a>

        <a href="producoes.html">
            <i class="fas fa-video"></i>
            Produções
        </a>

        <a href="relatorio.html">
            <i class="fas fa-chart-line"></i>
            Relatórios
        </a>

        <a href="configs.html">
            <i class="fas fa-gear"></i>
            Configurações
        </a>

        <a href="#" onclick="logout()">
            <i class="fas fa-right-from-bracket"></i>
            Sair
        </a>

    </nav>

</aside>

<div class="overlay" id="overlay"></div>

<header class="top-header">

    <div class="menu-btn">
        <i class="fas fa-bars"></i>
    </div>

    <div class="logo-area">
        <h1>Publicações</h1>
    </div>

</header>

<section class="page-content">

    <div class="publicacoes-top">

        <input type="text" id="pesquisaPublicacao" placeholder="Pesquisar por título, evento, plataforma ou status...">

        <button class="primary-btn" id="abrirModal">
            Nova Publicação
        </button>

    </div>

    <div class="filtros">

        <button class="filtro-btn active" data-status="Todos">Todos</button>

        <button class="filtro-btn" data-status="Agendado">Agendados</button>

        <button class="filtro-btn" data-status="Publicado">Publicados</button>

        <button class="filtro-btn" data-status="Rascunho">Rascunhos</button>

    </div>

    <div id="listaPublicacoes"></div>

</section>

<div class="modal" id="modalPublicacao">

    <div class="modal-content">

        <h2>Nova Publicação</h2>

        <input type="text" id="titulo" placeholder="Título da publicação">

        <input type="text" id="eventoRelacionado" placeholder="Evento ou produção relacionada">

        <textarea
        id="descricao"
        placeholder="Descrição da publicação, legenda ou texto utilizado"></textarea>

        <select id="tipo">
            <option>Arte Institucional</option>
            <option>Vídeo</option>
            <option>Banner</option>
            <option>Campanha</option>
            <option>Comunicado</option>
            <option>Reels</option>
            <option>Stories</option>
            <option>Carrossel</option>
        </select>

        <select id="plataforma">
            <option>Instagram</option>
            <option>Facebook</option>
            <option>Site Oficial</option>
            <option>WhatsApp</option>
            <option>Todas as plataformas</option>
        </select>

        <input type="date" id="data">

        <input type="time" id="hora">

        <input type="text" id="responsavel" placeholder="Responsável pela publicação">

        <input type="url" id="linkPublicacao" placeholder="Link da publicação, se houver">

        <select id="status">
            <option>Agendado</option>
            <option>Publicado</option>
            <option>Rascunho</option>
        </select>

        <div class="modal-actions">

            <button id="salvarPublicacao">
                Salvar
            </button>

            <button id="fecharModal">
                Cancelar
            </button>

        </div>

    </div>

</div>

<nav class="bottom-nav">

    <a href="../dashboard.html">
        <i class="fas fa-house"></i>

    <a href="solicitacoes.html">

    <a href="agenda.html">

        <span>Agenda</span>
    </a>

    <a href="relatorio.html">
        <i class="fas fa-chart-line"></i>
        <span>Relatórios</span>
    </a>

    <a href="mais.html" class="active">
        <i class="fas fa-ellipsis"></i>
        <span>Mais</span>
    </a>

</nav>

<script src="../assets/js/sidebar.js"></script>
<script src="../assets/js/publicacoes.js"></script>
<script type="module" src="../assets/js/auth.js"></script>

</body>

</html>
