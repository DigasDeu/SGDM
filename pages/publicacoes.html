<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Publicações</title>

<link rel="stylesheet"
href="../assets/css/style.css">

<link rel="stylesheet"
href="../assets/css/publicacoes.css">

<link rel="stylesheet"
href="../assets/css/sidebar.css">

<link rel="stylesheet"
href="../assets/css/responsive.css">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
rel="stylesheet">

</head>

<body>

<!-- SIDEBAR -->

<aside class="sidebar" id="sidebar">

    <div class="sidebar-header">

        <img
        src="../assets/img/user.png">

        <h3>Diego</h3>

        <p>Departamento de Mídia</p>

    </div>

    <nav class="sidebar-menu">

        <a href="../index.html">

            <i class="fas fa-house"></i>

            Dashboard

        </a>

        <a href="agenda.html">

            <i class="fas fa-calendar"></i>

            Agenda

        </a>

        <a href="solicitacoes.html">

            <i class="fas fa-file-lines"></i>

            Solicitações

        </a>

        <a href="relatorio.html">

            <i class="fas fa-chart-line"></i>

            Relatórios

        </a>

    </nav>

</aside>

<div class="overlay" id="overlay"></div>

<!-- HEADER -->

<header class="top-header">

    <div class="menu-btn">

        <i class="fas fa-bars"></i>

    </div>

    <div class="logo-area">

        <h1>Publicações</h1>

    </div>

</header>

<!-- CONTEÚDO -->

<section class="page-content">

    <!-- TOPO -->

    <div class="publicacoes-top">

        <input
        type="text"
        id="pesquisaPublicacao"
        placeholder="Pesquisar publicação...">

        <button
        class="primary-btn"
        id="abrirModal">

            Nova Publicação

        </button>

    </div>

    <!-- FILTROS -->

    <div class="filtros">

        <button class="filtro-btn active"
        data-status="Todos">

            Todos

        </button>

        <button class="filtro-btn"
        data-status="Agendado">

            Agendados

        </button>

        <button class="filtro-btn"
        data-status="Publicado">

            Publicados

        </button>

        <button class="filtro-btn"
        data-status="Rascunho">

            Rascunhos

        </button>

    </div>

    <!-- LISTA -->

    <div id="listaPublicacoes">

    </div>

</section>

<!-- MODAL -->

<div class="modal" id="modalPublicacao">

    <div class="modal-content">

        <h2>Nova Publicação</h2>

        <input
        type="text"
        id="titulo"
        placeholder="Título da publicação">

        <textarea
        id="descricao"
        placeholder="Descrição da publicação">
        </textarea>

        <select id="tipo">

            <option>Arte Institucional</option>

            <option>Vídeo</option>

            <option>Banner</option>

            <option>Campanha</option>

            <option>Comunicado</option>

        </select>

        <select id="plataforma">

            <option>Instagram</option>

            <option>Facebook</option>

            <option>Site Oficial</option>

            <option>WhatsApp</option>

        </select>

        <input
        type="date"
        id="data">

        <input
        type="time"
        id="hora">

        <select id="status">

            <option>Agendado</option>

            <option>Publicado</option>

            <option>Rascunho</option>

        </select>

        <div class="modal-actions">

            <button id="salvarPublicacao">

                Salvar

            </button>

            <button id="fecharModal">

                Cancelar

            </button>

        </div>

    </div>

</div>

<!-- MENU INFERIOR -->

<nav class="bottom-nav">

    <a href="../index.html">

        <i class="fas fa-house"></i>

        <span>Início</span>

    </a>

    <a href="agenda.html">

        <i class="fas fa-calendar"></i>

        <span>Agenda</span>

    </a>

    <a href="relatorio.html">

        <i class="fas fa-chart-line"></i>

        <span>Relatórios</span>

    </a>

</nav>

<script src="../assets/js/sidebar.js"></script>

<script src="../assets/js/publicacoes.js"></script>

</body>

</html>
