<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Configurações</title>

<link rel="stylesheet" href="assets/css/confings.css">

</head>

<body>

<div class="config-container">

    <div class="page-header">

        <h1>⚙️ Configurações</h1>

        <p>Gerencie as preferências do sistema</p>

    </div>

    <div class="config-card">

        <h2>Perfil do Usuário</h2>

        <input type="text" placeholder="Nome completo">

        <input type="email" placeholder="E-mail">

        <input type="text" placeholder="Cargo">

        <button>Salvar</button>

    </div>

    <div class="config-card">

        <h2>Aparência</h2>

        <div class="setting-item">

            <span>Modo Escuro</span>

            <input type="checkbox">

        </div>

    </div>

    <div class="config-card">

        <h2>Notificações</h2>

        <div class="setting-item">

            <span>Novas Solicitações</span>

            <input type="checkbox" checked>

        </div>

    </div>

    <div class="config-card">

        <h2>Assinaturas dos Relatórios</h2>

        <input type="text" placeholder="Coordenador de Mídia">

        <input type="text" placeholder="Secretário Municipal">

        <input type="text" placeholder="Responsável pela Cobertura">

    </div>

</div>

</body>
</html>
