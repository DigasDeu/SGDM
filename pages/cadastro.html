<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro</title>

<link rel="stylesheet" href="../assets/css/login.css">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

</head>

<body>

<div class="login-container">

    <img src="../assets/img/semsa-logo.png" class="logo" alt="Logo SEMSA">

    <h1>Criar Conta</h1>

    <p class="login-subtitle">
        Crie sua conta para iniciar a identificação funcional no SGDM.
    </p>

    <form class="login-box" id="formCadastro">

        <input
        type="text"
        id="nome"
        placeholder="Nome completo"
        autocomplete="name"
        required>

        <input
        type="email"
        id="email"
        placeholder="Seu e-mail / Gmail"
        autocomplete="email"
        required>

        <input
        type="password"
        id="senha"
        placeholder="Crie uma senha"
        autocomplete="new-password"
        required>

        <input
        type="password"
        id="confirmarSenha"
        placeholder="Confirmar senha"
        autocomplete="new-password"
        required>

        <button type="submit" id="cadastroBtn">
            Criar Conta
        </button>

    </form>

    <p class="cadastro-link">
        Já possui conta?
        <a href="../login.html">Entrar</a>
    </p>

</div>

<script type="module" src="../assets/js/cadastro.js"></script>

</body>

</html>
